version: '3.8'

services:
  # AI Agent Platform API Gateway - Test Configuration
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_DATE: "2025-09-21T05:09:00Z"
        VCS_REF: "test"
        VERSION: "1.0.0-test"
    container_name: ai-agent-gateway-test
    ports:
      - "8000:8000"
    environment:
      # Application settings
      ENVIRONMENT: development
      DEBUG: "true"
      LOG_LEVEL: DEBUG
      LOG_FORMAT: json
      
      # Service URLs (using provided URLs)
      AMS_BASE_URL: https://ptcpemfokwjgpjgmbgoj.supabase.co/functions/v1/ams
      LETTA_BASE_URL: https://lettalettalatest-production-a3ba.up.railway.app
      LITELLM_BASE_URL: https://litellm-production-1c8b.up.railway.app
      SUPABASE_URL: https://ptcpemfokwjgpjgmbgoj.supabase.co
      
      # Authentication (using provided keys)
      SUPABASE_JWT_SECRET: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB0Y3BlbWZva3dqZ3BqZ21iZ29qIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc1NjI0MDUzMSwiZXhwIjoyMDcxODE2NTMxfQ.02O9W9_phruZRvCx55Tkh6EFG2GLPl3Eo7qdFAlX0Os
      LETTA_API_KEY: letta-dev-key-placeholder
      AGENT_SECRET_MASTER_KEY: dev-agent-secret-master-key-12345678901234567890
      
      # Performance settings (relaxed for testing)
      MAX_CONCURRENT_REQUESTS: 100
      REQUEST_TIMEOUT: 10.0
      LETTA_TIMEOUT: 30.0
      
      # Feature flags (relaxed for testing)
      ENABLE_RATE_LIMITING: "false"
      ENABLE_CACHING: "false"  # Disable caching to avoid Redis dependency
      ENABLE_METRICS: "true"
      ENABLE_DOCS: "true"
      
      # CORS configuration
      ALLOWED_ORIGINS: '["http://localhost:3000", "http://localhost:3001", "http://127.0.0.1:3000"]'
      
      # Redis configuration (will be ignored if caching disabled)
      REDIS_URL: redis://redis:6379
      REDIS_PASSWORD: ""
      REDIS_DB: 0
      
      # Circuit breaker settings (relaxed for testing)
      CIRCUIT_BREAKER_FAILURE_THRESHOLD: 50
      CIRCUIT_BREAKER_RECOVERY_TIMEOUT: 10
    
    networks:
      - gateway_network
    
    restart: "no"  # Don't restart automatically during testing
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Redis for caching (optional for testing)
  redis:
    image: redis:7-alpine
    container_name: ai-agent-redis-test
    ports:
      - "6379:6379"
    networks:
      - gateway_network
    restart: "no"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    profiles:
      - redis

networks:
  gateway_network:
    driver: bridge
